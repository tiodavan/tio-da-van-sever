version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: tiodavan_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiodavan_db}
      POSTGRES_USER: ${POSTGRES_USER:-tio_da_van_developer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ['postgres', '-c', 'wal_level=logical']

  postgres-init:
    image: postgres:15
    depends_on:
      - postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD}
    entrypoint: >
      sh -c "
        sleep 5 &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ${POSTGRES_USER:-tio_da_van_developer} -d ${POSTGRES_DB:-tiodavan_db} -c \"
          DO \$\$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'tio_da_van_ro') THEN
              CREATE ROLE tio_da_van_ro LOGIN PASSWORD '${POSTGRES_RO_PASSWORD}';
              GRANT CONNECT ON DATABASE ${POSTGRES_DB:-tiodavan} TO tio_da_van_ro;
              GRANT USAGE ON SCHEMA public TO tio_da_van_ro;
              GRANT SELECT ON ALL TABLES IN SCHEMA public TO tio_da_van_ro;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO tio_da_van_ro;
            END IF;
          END
          \$\$;
        \"
      "

  nestjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder        # use builder stage locally for hot reload
    container_name: tiodavan_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tio_da_van_developer}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tiodavan_db}
      NODE_ENV: development
    volumes:
      - .:/app               # mount source for hot reload
      - /app/node_modules    # anonymous volume to avoid overwriting container node_modules
    command: npm run start:dev

volumes:
  pgdata:
